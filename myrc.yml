apiVersion: v1
kind: ReplicationController
metadata:
  name: mylogin-rc
spec:
  replicas: 3
  selectors:
     app: mylogin
  template:
    metadata:
       labels:
          app: mylogin
    spec:
      containers:
      - name: mylogin-container
        image: nginx
        ports:
         - containerPort: 8080         
  
