apiVersion: v2
kind: ReplicationController
metadata:
  name: mymginx-rc
spec:
  replicas: 3
  selectors:
     app: mynginx
  template:
    metadata:
       labels:
          app: mynginx
    spec:
      containers:
      - name: mynginx-container
        image: nginx
        ports:
         - containerPort: 80        
  
